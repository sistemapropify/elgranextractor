{% extends 'propifai_base.html' %}
{% load static %}

{% block extra_head %}
<!-- Bootstrap 5 CSS (necesario para modales, cards, forms) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
    :root {
        --acm-bg: #0d1117;
        --acm-card-bg: #161b22;
        --acm-border: #30363d;
        --acm-text-primary: #f0f6fc;
        --acm-text-secondary: #c9d1d9;
        --acm-text-muted: #8b949e;
        --acm-accent: #58a6ff;
        --acm-success: #238636;
        --acm-success-hover: #2ea043;
        --acm-danger: #da3633;
        --acm-danger-hover: #f85149;
        --acm-input-bg: #0d1117;
        --acm-input-border: #30363d;
        --acm-header-bg: #21262d;
    }

    /* ============================================
       ESTILOS GLOBALES ACM
       ============================================ */
    .acm-container {
        background-color: var(--acm-bg);
        min-height: 100vh;
        padding: 0;
    }

    /* Sidebar ACM */
    .acm-sidebar {
        background-color: var(--acm-card-bg) !important;
        border-right: 1px solid var(--acm-border) !important;
    }
    .acm-sidebar .sidebar-brand {
        color: var(--acm-accent) !important;
        border-bottom: 1px solid var(--acm-border) !important;
    }
    .acm-sidebar .nav-item {
        color: var(--acm-text-secondary) !important;
    }
    .acm-sidebar .nav-item:hover {
        background-color: var(--acm-header-bg) !important;
        color: var(--acm-text-primary) !important;
    }
    .acm-sidebar .nav-item.active {
        background-color: rgba(88, 166, 255, 0.1) !important;
        color: var(--acm-accent) !important;
        border-left: 3px solid var(--acm-accent) !important;
    }

    /* Cards */
    .acm-container .card {
        background-color: var(--acm-card-bg);
        border: 1px solid var(--acm-border);
        border-radius: 6px;
        margin-bottom: 0;
    }
    .acm-container .card-header {
        background-color: var(--acm-header-bg);
        border-bottom: 1px solid var(--acm-border);
        padding-top: 0.25rem;
        padding-bottom: 0.25rem;
    }
    .acm-container .card-header h6 {
        color: var(--acm-text-secondary);
        font-size: 14px;
        font-weight: 600;
    }
    .acm-container .card-body {
        padding-top: 0.25rem;
        padding-bottom: 0.25rem;
        color: var(--acm-text-secondary);
    }

    /* Form controls */
    .acm-container .form-label {
        color: var(--acm-text-muted);
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 0.1rem;
    }
    .acm-container .form-control,
    .acm-container .form-select {
        background-color: var(--acm-input-bg);
        border: 1px solid var(--acm-input-border);
        border-radius: 6px;
        color: var(--acm-text-secondary);
        font-size: 14px;
    }
    .acm-container .form-control:focus,
    .acm-container .form-select:focus {
        outline: none;
        border-color: var(--acm-accent);
        box-shadow: none;
    }
    .acm-container .form-control::placeholder,
    .acm-container .form-select::placeholder {
        color: var(--acm-text-muted);
        opacity: 0.6;
    }

    /* Buttons */
    .acm-container .btn-primary {
        background-color: var(--acm-success);
        border: none;
        border-radius: 6px;
        color: white;
    }
    .acm-container .btn-primary:hover {
        background-color: var(--acm-success-hover);
    }
    .acm-container .btn-outline-secondary {
        background-color: var(--acm-border);
        border: none;
        border-radius: 6px;
        color: var(--acm-text-secondary);
    }
    .acm-container .btn-outline-secondary:hover {
        background-color: #3c444d;
    }
    .acm-container .btn-outline-danger {
        background-color: var(--acm-danger);
        border: none;
        border-radius: 6px;
        color: white;
    }
    .acm-container .btn-outline-danger:hover {
        background-color: var(--acm-danger-hover);
    }
    .acm-container .btn-outline-success {
        background-color: var(--acm-success);
        border: none;
        border-radius: 6px;
        color: white;
    }
    .acm-container .btn-outline-success:hover {
        background-color: var(--acm-success-hover);
    }
    .acm-container .btn-outline-primary {
        background-color: var(--acm-border);
        border: none;
        border-radius: 6px;
        color: var(--acm-text-secondary);
    }
    .acm-container .btn-outline-primary:hover {
        background-color: #3c444d;
    }

    /* Badges */
    .acm-container .badge.bg-primary {
        background-color: rgba(35, 134, 54, 0.2);
        color: #3fb950;
    }
    .acm-container .badge.bg-info {
        background-color: var(--acm-header-bg);
        color: var(--acm-text-secondary);
        border-radius: 6px;
    }

    /* Text */
    .acm-container,
    .acm-container .card,
    .acm-container .card * {
        color: var(--acm-text-primary);
    }
    .acm-container .text-muted {
        color: var(--acm-text-muted);
    }

    /* Spacing */
    .acm-container .mb-1 {
        margin-bottom: 0.25rem;
    }
    .acm-container .mb-2 {
        margin-bottom: 0.35rem;
    }

    /* App content */
    .app-content {
        padding-top: 0;
        padding-bottom: 0;
    }

    /* Scrollbar */
    .acm-container ::-webkit-scrollbar {
        width: 8px;
    }
    .acm-container ::-webkit-scrollbar-track {
        background: var(--acm-bg);
    }
    .acm-container ::-webkit-scrollbar-thumb {
        background: var(--acm-border);
        border-radius: 4px;
    }
    .acm-container ::-webkit-scrollbar-thumb:hover {
        background: #3c444d;
    }

    /* Checkbox */
    .form-check-input {
        background-color: var(--acm-input-bg);
        border-color: var(--acm-input-border);
    }
    .form-check-input:checked {
        background-color: var(--acm-accent);
        border-color: var(--acm-accent);
    }

    /* Links */
    a:not(.nav-item):not(.btn):not(.page-link):not(.dropdown-item) {
        color: var(--acm-accent);
    }
    a:not(.nav-item):not(.btn):not(.page-link):not(.dropdown-item):hover {
        color: #79c0ff;
    }
    .btn-link {
        color: var(--acm-accent);
    }
    .btn-link:hover {
        color: #79c0ff;
    }

    /* Close button */
    .close {
        color: var(--acm-text-primary);
    }
    .modal-header .close {
        color: var(--acm-text-primary);
    }
    button.close:hover {
        color: var(--acm-text-primary);
    }
</style>
{% endblock %}

{% block content %}
<div class="acm-container">
    {% block acm_content %}
    {% endblock %}
</div>
{% endblock %}

{% block extra_scripts %}
<!-- Bootstrap JS (necesario para modales y toasts en ACM) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbz8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
    // ============================================================
    // VARIABLES GLOBALES PARA COMPARTIR ACM
    // ============================================================
    var ACM_USER_ID = null;
    var ACM_USER_PHONE = '';
    {% if user_id %}
    ACM_USER_ID = '{{ user_id }}';
    {% endif %}
    {% if user_phone %}
    ACM_USER_PHONE = '{{ user_phone }}';
    {% endif %}
</script>
<script src="{% static 'acm/js/acm.js' %}?v=15"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sidebarToggle = document.getElementById('sidebarToggle');
        const appSidebar = document.getElementById('appSidebar');
        
        function closeSidebar() {
            document.body.classList.remove('sidebar-open');
        }
        
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 1024 && document.body.classList.contains('sidebar-open')) {
                const clickedInsideSidebar = appSidebar && appSidebar.contains(e.target);
                const clickedOnToggle = sidebarToggle && sidebarToggle.contains(e.target);
                if (!clickedInsideSidebar && !clickedOnToggle) {
                    closeSidebar();
                }
            }
        });
        
        if (appSidebar) {
            let touchStartX = 0;
            appSidebar.addEventListener('touchstart', function(e) {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            appSidebar.addEventListener('touchend', function(e) {
                const touchEndX = e.changedTouches[0].screenX;
                const swipeDistance = touchStartX - touchEndX;
                if (swipeDistance > 80 && document.body.classList.contains('sidebar-open')) {
                    closeSidebar();
                }
            }, { passive: true });
        }
    });
</script>
{% if google_maps_api_key %}
<script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places,geometry&callback=initACMMap" defer></script>
{% endif %}
{% endblock %}
