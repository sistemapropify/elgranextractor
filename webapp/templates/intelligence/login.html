<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Prometeo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c9d1d9;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo img {
            max-width: 200px;
            height: auto;
        }
        .login-logo p {
            color: #8b949e;
            font-size: 14px;
            margin-top: 8px;
        }
        .form-control {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
        }
        .form-control:focus {
            background: #0d1117;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
            color: #c9d1d9;
        }
        .form-control::placeholder { color: #484f58; }
        .form-label { color: #c9d1d9; font-weight: 500; font-size: 14px; margin-bottom: 6px; }
        .btn-primary {
            background: #007981;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: #008A93;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,121,129,0.3);
        }
        .alert {
            border-radius: 8px;
            font-size: 14px;
            padding: 12px 16px;
        }
        .alert-danger { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: #f85149; }
        .alert-success { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); color: #3fb950; }
        .alert-info { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.3); color: #58a6ff; }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #8b949e;
            font-size: 14px;
        }
        .register-link a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link a:hover { text-decoration: underline; }
        .password-toggle {
            position: relative;
        }
        .password-toggle .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 14px;
        }
        .password-toggle .toggle-btn:hover { color: #c9d1d9; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                {% load static %}
                <img src="{% static 'acm/img/LOGO-PROPIFY.png' %}" alt="Propifai" height="48" class="mb-2"
                     onerror="this.onerror=null;this.style.display='none';var d=document.createElement('div');d.style.cssText='width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:24px;margin-bottom:0.5rem;';d.textContent='P';this.parentElement.appendChild(d)">
                <p>Sistema de Inteligencia Inmobiliaria</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} mb-3" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                {% if request.GET.next %}
                    <input type="hidden" name="next" value="{{ request.GET.next }}">
                {% endif %}

                <div class="mb-3">
                    <label for="username" class="form-label">Nombre de usuario</label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Tu nombre de usuario" required autofocus
                           value="{{ request.POST.username|default:'' }}">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <div class="password-toggle">
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Tu contraseña" required>
                        <button type="button" class="toggle-btn" onclick="togglePassword()" tabindex="-1">
                            👁️
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </form>

            <div class="register-link">
                ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
