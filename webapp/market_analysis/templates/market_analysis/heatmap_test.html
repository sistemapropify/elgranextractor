{% extends 'base.html' %}
{% load static %}

{% block title %}Heatmap Test - El Gran Extractor{% endblock %}

{% block content %}
<div class="container py-4">
    <h1>Heatmap Test</h1>
    <p>Prueba de template ultra simplificado.</p>
    
    <div id="heatmapMap" style="height: 500px; width: 100%; border: 1px solid #ccc; background: #f0f0f0;">
        <div style="text-align: center; padding: 200px 0;">
            <p>Mapa de Google aparecerá aquí si JavaScript funciona</p>
        </div>
    </div>
    
    <div class="mt-3">
        <button id="testButton" class="btn btn-primary">Probar JavaScript</button>
        <div id="testResult" class="mt-2"></div>
    </div>
</div>

<!-- Google Maps API -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBrL1QF7vTl9zF8FmCUumfRpFJcaYokO7Q&libraries=visualization"></script>

<script>
console.log("Script de prueba cargado correctamente");
document.addEventListener('DOMContentLoaded', function() {
    console.log("DOM cargado en template de prueba");
    
    document.getElementById('testButton').addEventListener('click', function() {
        document.getElementById('testResult').innerHTML = '<div class="alert alert-success">JavaScript funciona correctamente!</div>';
        console.log("Botón clickeado - JavaScript funciona");
    });
    
    // Intentar inicializar mapa
    try {
        if (typeof google !== 'undefined' && google.maps) {
            const map = new google.maps.Map(document.getElementById('heatmapMap'), {
                center: { lat: -12.0464, lng: -77.0428 },
                zoom: 12
            });
            console.log("Mapa de Google inicializado exitosamente");
            document.getElementById('testResult').innerHTML += '<div class="alert alert-info mt-2">Mapa de Google inicializado</div>';
        } else {
            console.error("Google Maps API no está disponible");
            document.getElementById('testResult').innerHTML += '<div class="alert alert-warning mt-2">Google Maps API no cargada</div>';
        }
    } catch (error) {
        console.error("Error al inicializar mapa:", error);
        document.getElementById('testResult').innerHTML += '<div class="alert alert-danger mt-2">Error: ' + error.message + '</div>';
    }
});
</script>
{% endblock %}
