# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - granextractorservice

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Collect Django static files
        env:
          # Valores dummy para que Django cargue settings sin conexión a BD.
          # collectstatic solo necesita que Django se inicie, no que consulte la BD.
          DB_NAME: 'dummy'
          DB_USER: 'dummy'
          DB_PASSWORD: 'dummy'
          DB_HOST: 'dummy'
          DB_PORT: '1433'
          SECRET_KEY: 'dummy-secret-key-for-build'
          PRODUCTION: 'true'
        run: |
          source antenv/bin/activate
          python webapp/manage.py collectstatic --noinput --clear

      - name: Validate Azure production startup
        env:
          DB_NAME: 'dummy'
          DB_USER: 'dummy'
          DB_PASSWORD: 'dummy'
          DB_HOST: 'dummy'
          DB_PORT: '1433'
          SECRET_KEY: 'dummy-secret-key-for-build'
          PRODUCTION: 'true'
          WEBSITE_SITE_NAME: 'granextractorservice'
        run: |
          source antenv/bin/activate
          python -c "import os, sys; sys.path.insert(0, 'webapp'); os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'settings'); from wsgi import application; print('Azure WSGI startup validated')"

      # Build the deployment artifact without generated browser profiles,
      # duplicated projects, logs, or other runtime-only data.
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !elgranextractor/**
            !webapp/camoufox_session/**
            !webapp/camoufox_session_adondevivir/**
            !webapp/logs/**
            !webapp/__pycache__/**
            !webapp/**/*.pyc
            !webapp/*.xlsx
            !webapp/*.log
            !webapp/*.har
          if-no-files-found: error
          retention-days: 1

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BD7ACFF66075413F896FF528B42CABC0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0FA92F15F0804AE197DC2EECF943B7DB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C521A0DD71BB48CE88443464F4F718FB }}

      - name: Wait for previous deployments to complete
        run: |
          echo "Waiting for Azure App Service to stabilize (120 seconds)..."
          sleep 120
          echo "Initial stabilization complete, checking slot status..."
          for i in {1..6}; do
            DEPLOYMENT_STATUS=$(az webapp deployment slot list -n granextractorservice -g DefaultResourceGroup-brazilsouth --query "[?name=='Production'].state" -o tsv 2>/dev/null || echo "unknown")
            echo "Slot status check $i - Status: $DEPLOYMENT_STATUS"
            if [ "$DEPLOYMENT_STATUS" = "Running" ] || [ "$DEPLOYMENT_STATUS" = "unknown" ]; then
              echo "Waiting for slot to stabilize... ($i/6)"
              sleep 15
            else
              echo "Slot appears ready for deployment"
              break
            fi
          done
          echo "Proceeding with deployment..."
          sleep 30

      - name: 'Deploy to Azure Web App (Attempt 1)'
        uses: azure/webapps-deploy@v3
        id: deploy-attempt-1
        with:
          app-name: 'granextractorservice'
          slot-name: 'Production'
        continue-on-error: true

      - name: Wait before retry
        if: steps.deploy-attempt-1.outcome == 'failure'
        run: |
          echo "Deployment attempt 1 failed, waiting 90 seconds before retry..."
          sleep 90

      - name: 'Deploy to Azure Web App (Attempt 2)'
        if: steps.deploy-attempt-1.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        id: deploy-attempt-2
        with:
          app-name: 'granextractorservice'
          slot-name: 'Production'
        continue-on-error: true

      - name: Wait before final retry
        if: steps.deploy-attempt-2.outcome == 'failure'
        run: |
          echo "Deployment attempt 2 failed, waiting 120 seconds before final retry..."
          sleep 120

      - name: 'Deploy to Azure Web App (Attempt 3 - Final)'
        if: steps.deploy-attempt-2.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        id: deploy-attempt-3
        with:
          app-name: 'granextractorservice'
          slot-name: 'Production'

      - name: Verify deployment
        if: success()
        run: |
          echo "Deployment completed successfully"
          echo "App URL: https://granextractorservice-emehaffsf8e2c7eg.brazilsouth-01.azurewebsites.net"
          for i in {1..20}; do
            HEALTH_STATUS=$(curl -s -o /tmp/health-response.json -w "%{http_code}" \
              --max-time 20 \
              https://granextractorservice-emehaffsf8e2c7eg.brazilsouth-01.azurewebsites.net/api/v1/intelligence/health/ \
              || echo "000")
            CSS_STATUS=$(curl -s -o /tmp/chat-workspace.css -w "%{http_code}" \
              --max-time 20 \
              https://granextractorservice-emehaffsf8e2c7eg.brazilsouth-01.azurewebsites.net/static/intelligence/chat-workspace.css \
              || echo "000")
            JS_STATUS=$(curl -s -o /tmp/chat.js -w "%{http_code}" \
              --max-time 20 \
              https://granextractorservice-emehaffsf8e2c7eg.brazilsouth-01.azurewebsites.net/static/intelligence/chat.js \
              || echo "000")
            LOGO_STATUS=$(curl -s -o /tmp/logo-propify.png -w "%{http_code}" \
              --max-time 20 \
              https://granextractorservice-emehaffsf8e2c7eg.brazilsouth-01.azurewebsites.net/static/intelligence/img/logo-propify.png \
              || echo "000")
            echo "Check $i/20 - health=$HEALTH_STATUS css=$CSS_STATUS js=$JS_STATUS logo=$LOGO_STATUS"
            if [ "$HEALTH_STATUS" = "200" ] \
              && [ "$CSS_STATUS" = "200" ] \
              && [ "$JS_STATUS" = "200" ] \
              && [ "$LOGO_STATUS" = "200" ] \
              && grep -q '"status":"ok"\|"status": "ok"' /tmp/health-response.json; then
              echo "Application and static assets are healthy"
              exit 0
            fi
            sleep 15
          done
          echo "Application or static assets did not become healthy"
          echo "=== Last 50 log entries ==="
          az webapp log tail \
            --name granextractorservice \
            --resource-group DefaultResourceGroup-brazilsouth || true
          exit 1

      - name: Logout from Azure
        if: always()
        run: |
          az logout || true
